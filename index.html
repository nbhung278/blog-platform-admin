<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="referrer" content="no-referrer" />
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<!--
			Baseline CSP shipped via meta. For production, set the *real* CSP at
			the reverse proxy / static host so it can include frame-ancestors
			(meta cannot). connect-src must include the backend origin — adjust
			when deploying to a different domain.
		-->
		<!--
			img-src was previously `https:` (any HTTPS host). Tightened to the
			specific origins admin actually loads images from: 'self' for
			favicons, data:/blob: for FileReader previews in the editor, the
			S3 bucket + CDN for user-uploaded media, and Google avatars for
			users created via OAuth on the public site (backend writes the
			Google picture URL into avatarUrl on signup).
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.strix-blog.uk https://strix-blog-media.s3.ap-southeast-1.amazonaws.com https://lh3.googleusercontent.com; font-src 'self' data:; connect-src 'self' https://api.strix-blog.uk wss://api.strix-blog.uk https://strix-blog-media.s3.ap-southeast-1.amazonaws.com; object-src 'none'; base-uri 'self'; form-action 'self'"
		/>
		<title>Blog Platform Admin</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
