<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="referrer" content="no-referrer" />
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<!--
			Baseline CSP shipped via meta. For production, set the *real* CSP at
			the reverse proxy / static host so it can include frame-ancestors
			(meta cannot). connect-src must include the backend origin — adjust
			when deploying to a different domain.
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http://localhost:3000 ws://localhost:* https://api.strix-blog.uk wss://api.strix-blog.uk https://strix-blog-media.s3.ap-southeast-1.amazonaws.com; object-src 'none'; base-uri 'self'; form-action 'self'"
		/>
		<title>Blog Platform Admin</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
